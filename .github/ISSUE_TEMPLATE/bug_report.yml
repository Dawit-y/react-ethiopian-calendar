name: Bug report
description: Report a problem with react-ethiopian-calendar
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the fields below so we can reproduce and fix the issue quickly.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I am importing the stylesheet via `react-ethiopian-calendar/style.css`.
          required: false

  - type: input
    id: version
    attributes:
      label: Package version
      description: Which version of `react-ethiopian-calendar` are you using?
      placeholder: e.g. 1.0.18
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected export
      description: Which part of the public API is affected?
      options:
        - EtCalendar
        - EtTimePicker
        - convertToEthiopian
        - Types / TypeScript
        - Other / Not sure
    validations:
      required: true

  - type: dropdown
    id: calendar-type
    attributes:
      label: Calendar type
      description: Which calendar mode does the bug occur in? (`calendarType` prop)
      options:
        - Ethiopian (calendarType={true})
        - Gregorian (calendarType={false})
        - Both
        - Not applicable
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Picker mode
      description: Single date or date range? (`dateRange` prop)
      options:
        - Single date
        - Date range (dateRange={true})
        - Not applicable
    validations:
      required: false

  - type: dropdown
    id: lang
    attributes:
      label: Language
      description: Which language is selected? (`lang` prop)
      options:
        - Amharic (am)
        - English (en)
        - Not applicable
    validations:
      required: false

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal, reliable set of steps (ideally a code snippet or a link to a runnable reproduction).
      placeholder: |
        1. Render `<EtCalendar dateRange calendarType={false} ... />`
        2. Select a start date ...
        3. ...
      render: tsx
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages or stack traces.
      render: shell
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: React version, browser, OS, bundler, etc.
      placeholder: |
        - react: 19.0.0
        - browser: Chrome 124
        - bundler: Vite 6
        - OS: Windows 11
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help (screenshots, related issues, etc.).
    validations:
      required: false
